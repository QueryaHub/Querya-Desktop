name: querya_desktop
description: Lightweight desktop SQL/NoSQL client. Flutter (Dart).
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  shadcn_flutter: ^0.0.52
  bitsdojo_window: ^0.1.6
  path: ^1.9.0
  path_provider: ^2.1.5
  sqflite: ^2.3.2
  sqflite_common_ffi: ^2.3.2
  mongo_dart: ^0.10.8
  redis: ^4.0.0
  postgres: ^3.5.6
  fl_chart: ^0.69.0
  mysql_client: ^0.0.27

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Used in tests to mock paths (path_provider has no plugin in flutter test).
  path_provider_platform_interface: ^2.1.2

dependency_overrides:
  # Patched ToastLayer (fixes InheritedNotifier crash on resize / hot reload).
  shadcn_flutter:
    path: third_party/shadcn_flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
