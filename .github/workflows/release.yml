# Release: ручной запуск сборки артефактов и публикация релиза с тегом v<version>.
# Триггер: Actions -> Release -> Run workflow

name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      full_version: ${{ steps.version.outputs.full_version }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from pubspec.yaml
        id: version
        shell: bash
        run: |
          FULL_VERSION=$(grep "^version:" pubspec.yaml | sed 's/version: //')
          VERSION=$(echo "$FULL_VERSION" | sed 's/+.*//')
          BUILD_NUMBER=$(echo "$FULL_VERSION" | sed 's/.*+//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "full_version=$FULL_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Zip Windows artifact
        run: |
          $tag = "v${{ steps.version.outputs.version }}"
          $dir = "build\windows\x64\runner\Release"
          Compress-Archive -Path "$dir\*" -DestinationPath "Querya-Desktop-$tag-windows.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: bundle-windows
          path: Querya-Desktop-v${{ steps.version.outputs.version }}-windows.zip
          if-no-files-found: error

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from pubspec.yaml
        id: version
        run: |
          FULL_VERSION=$(grep "^version:" pubspec.yaml | sed 's/version: //')
          VERSION=$(echo "$FULL_VERSION" | sed 's/+.*//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libsecret-1-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux (release)
        run: flutter build linux --release

      - name: Zip Linux artifact
        run: |
          cd build/linux/x64/release/bundle
          zip -r "${GITHUB_WORKSPACE}/Querya-Desktop-v${{ steps.version.outputs.version }}-linux.zip" .

      - uses: actions/upload-artifact@v4
        with:
          name: bundle-linux
          path: Querya-Desktop-v${{ steps.version.outputs.version }}-linux.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: bundle-*
          merge-multiple: true

      - name: Layout distribution files
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -name '*.zip' -exec mv -t dist/ {} +
          test "$(find dist -name '*.zip' | wc -l)" -eq 2
          cd dist
          sha256sum *.zip | tee SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-windows.outputs.version }}
          name: Release v${{ needs.build-windows.outputs.version }}
          body: |
            ## Querya Desktop v${{ needs.build-windows.outputs.version }}

            ### Downloads
            - **Linux**: Querya-Desktop-v${{ needs.build-windows.outputs.version }}-linux.zip
            - **Windows**: Querya-Desktop-v${{ needs.build-windows.outputs.version }}-windows.zip

            ### Build Info
            - Version: ${{ needs.build-windows.outputs.full_version }}
            - Build Number: ${{ needs.build-windows.outputs.build_number }}
            - Commit: ${{ github.sha }}
          fail_on_unmatched_files: true
          files: |
            dist/*.zip
            dist/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
